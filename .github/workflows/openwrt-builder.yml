#
# https://github.com/P3TERX/Actions-OpenWrt
#
name: OpenWrt 云编译 (J1900 毕业版)

on:
  workflow_dispatch:      # 允许手动按钮触发
  schedule:
    - cron: '0 16 * * *'  # 每天北京时间 00:00 自动运行 (UTC 16:00)

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo rm -rf /usr/local/share/boost /usr/lib/x86_64-linux-gnu/openblas
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo apt-get autoremove -y --purge
          sudo apt-get clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 3. 获取服务器环境信息 (GitHub Runner) 💻
        run: |
          echo "SERVER_CPU_MODEL=$(lscpu | grep 'Model name' | cut -f2 -d: | sed 's/^ //g')" >> $GITHUB_ENV
          echo "SERVER_CORES=$(nproc)" >> $GITHUB_ENV
          echo "========= 编译服务器硬件详情 ========="
          lscpu | grep "Model name"
          echo "CPU 核心数: $(nproc)"
          free -h
          df -hT $PWD
          echo "===================================="

      - name: 4. 克隆源码
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 5. 加载自定义 feeds (diy-part1)
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 6. 更新 feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: 7. 安装 feeds
        run: |
          cd openwrt
          ./scripts/feeds install -a
          ./scripts/feeds install -a

      - name: 8. 加载自定义配置 (diy-part2)
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 8.5 挂载 ccache 编译缓存机制 ⚡
        uses: actions/cache@v4
        with:
          path: /workdir/openwrt/.ccache
          key: openwrt-ccache-j1900-${{ hashFiles('openwrt/.config') }}
          restore-keys: |
            openwrt-ccache-j1900-

      - name: 9. 下载软件包
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 10. 编译固件
        id: compile
        run: |
          cd openwrt
          
          # 激活并配置配置 ccache 环境变量
          export DEFAULT_SUBTARGET="generic"
          export TOPDIR="/workdir/openwrt"
          export CCACHE_DIR="$TOPDIR/.ccache"
          export PATH="/usr/lib/ccache:$PATH"
          
          # 让 OpenWrt 源码里的配置识别 ccache
          sed -i 's/CONFIG_CCACHE=n/CONFIG_CCACHE=y/g' .config 2>/dev/null || true
          echo "CONFIG_CCACHE=y" >> .config
          
          echo -e "$(nproc) 线程 开始编译"
          make -j$(nproc) || make -j1 || make -j1 V=s
          if [ $? -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "编译失败！"
            exit 1
          fi
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: 11. 整理固件文件
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 12. 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: 13. 生成发布标签 (Release Tag)
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          echo "J1900 毕业精简版固件 (Master 26)" >> release.txt
          echo "默认后台地址: 10.1.1.1" >> release.txt
          echo "云端编译环境: ${{ env.SERVER_CPU_MODEL }} (${{ env.SERVER_CORES }}核)" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 14. 发布固件至 Releases
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success' && !cancelled()
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 15. 发送通知 🚀
        if: !cancelled() && env.TELEGRAM_TOKEN && env.TELEGRAM_CHAT_ID
        run: |
          if [ "${{ steps.compile.outputs.status }}" = "success" ]; then
            STATUS="✅ 编译成功"
          else
            STATUS="❌ 编译失败"
          fi
          curl -s "https://api.telegram.org/bot${{ env.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ env.TELEGRAM_CHAT_ID }}" \
          -d "parse_mode=HTML" \
          -d "text=<b>${STATUS}！</b>%0A%0A<b>💻 编译服务器：</b> ${{ env.SERVER_CPU_MODEL }} (${{ env.SERVER_CORES }}核)%0A<b>🛠 编译设备：</b> J1900%0A<b>🌐 默认地址：</b> 10.1.1.1%0A<b>📅 结束时间：</b> $(date +'%Y-%m-%d %H:%M:%S')"

      - name: 16. 清理旧的 Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
