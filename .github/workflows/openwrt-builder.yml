name: OpenWrt 云编译 (J1900 毕业精简版)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev jq

      # 缓存 ccache 和 dl 目录（独立于源码目录）
      - name: 3. 挂载编译缓存 (ccache & dl)
        uses: actions/cache@v4
        with:
          path: |
            cache/dl
            cache/ccache
          key: ${{ runner.os }}-openwrt-${{ hashFiles('feeds.conf.default', '.config', 'diy-part1.sh', 'diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-

      - name: 4. TG 通知 (编译开始)
        if: always()
        run: |
          MSG="🚀 OpenWrt 编译开始%0A%0A📦 仓库: ${GITHUB_REPOSITORY}%0A🕒 时间: $(date '+%Y-%m-%d %H:%M:%S')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG"

      - name: 5. 克隆源码与编译
        id: compile
        run: |
          # 克隆到独立目录 openwrt-src
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt-src
          cd openwrt-src

          # 准备缓存目录（工作区根目录下的 cache 文件夹）
          mkdir -p ../cache/dl ../cache/ccache

          # 软链接缓存目录到 OpenWrt 源码内
          ln -sf ../cache/dl dl
          ln -sf ../cache/ccache .ccache

          # 启用 ccache
          export CCACHE_DIR="$PWD/.ccache"
          export PATH="/usr/lib/ccache:$PATH"
          ccache -M 10G

          # 复制 feeds 配置
          [ -e ../$FEEDS_CONF ] && cp ../$FEEDS_CONF feeds.conf.default
          # 执行自定义脚本 diy-part1.sh
          chmod +x ../$DIY_P1_SH && ../$DIY_P1_SH
          # 更新 feeds
          ./scripts/feeds update -a && ./scripts/feeds install -a
          # 复制 .config
          [ -e ../$CONFIG_FILE ] && cp ../$CONFIG_FILE .config
          # 执行自定义脚本 diy-part2.sh
          chmod +x ../$DIY_P2_SH && ../$DIY_P2_SH

          # ==================== 🛠️ 强制精准剔除 PassWall 与 Xray ====================
          echo "正在精准移除 xray-core 及 PassWall 相关组件..."
          rm -rf package/feeds/packages/net/xray-core
          rm -rf package/feeds/packages/net/xray-plugin
          rm -rf package/feeds/luci/applications/luci-app-passwall
          
          # 在 .config 中强行将其关闭，防止配置文件残存产生编译死循环
          sed -i 's/CONFIG_PACKAGE_luci-app-passwall=y/# CONFIG_PACKAGE_luci-app-passwall is not set/g' .config
          sed -i 's/CONFIG_PACKAGE_xray-core=y/# CONFIG_PACKAGE_xray-core is not set/g' .config
          # ========================================================================

          # ==================== 🎛️ 动态注入网页端重置按键组件 ====================
          echo "正在注入网页端一键恢复出厂设置组件..."
          mkdir -p files/usr/libexec/rpcd
          mkdir -p files/usr/share/rpcd/acl.d
          mkdir -p files/usr/share/luci/menu.d
          mkdir -p files/www/luci-static/resources/view/system

          # 1. 注入后端执行脚本
          cat << 'EOF' > files/usr/libexec/rpcd/web_reset
          #!/bin/sh
          case "$1" in
              action)
                  # 延迟 3 秒执行，确保前端网页成功接收到返回响应后再执行重置与重启
                  (sleep 3; firstboot -y && reboot) &
                  echo '{"status":"success","message":"System is resetting and rebooting..."}'
                  ;;
              *)
                  echo '{"status":"error","message":"Invalid action"}'
                  exit 1
                  ;;
          esac
          EOF
          chmod +x files/usr/libexec/rpcd/web_reset

          # 2. 注入 RPCD 的 ACL 权限认证（允许前端调用此脚本）
          cat << 'EOF' > files/usr/share/rpcd/acl.d/web_reset.json
          {
              "web_reset": {
                  "description": "Grant access to web reset script",
                  "read": {
                      "cgi-io": [ "exec" ]
                  },
                  "write": {
                      "cgi-io": [ "exec" ]
                  }
              }
          }
          EOF

          # 3. 注入 LuCI 导航菜单项 (挂载在“系统”菜单下)
          cat << 'EOF' > files/usr/share/luci/menu.d/luci-mod-admin-reset.json
          {
              "admin/system/web_reset": {
                  "title": "网页重置",
                  "action": {
                      "type": "view",
                      "path": "system/web_reset"
                  },
                  "order": 99,
                  "depends": {
                      "acl": [ "web_reset" ]
                  }
              }
          }
          EOF

          # 4. 注入新版 LuCI 专属的前端 JS 渲染视图页面
          cat << 'EOF' > files/www/luci-static/resources/view/system/web_reset.js
          'use strict';
          /* sysauth: admin */

          return L.view.extend({
              handleReset: function(ev) {
                  if (!confirm(_('确定要将系统恢复出厂设置吗？此操作不可逆，将清除所有用户配置！')))
                      return;

                  L.ui.showModal(_('正在重置'), [
                      E('p', { 'class': 'spinning' }, _('系统正在清除数据并重启，请在 1-2 分钟后尝试重新连接路由器...'))
                  ]);
              }
          });
          EOF

          # ==================== 开始编译 ====================
          make defconfig
          make -j$(nproc) V=s

      # ----- 新增：收集固件并准备上传 -----
      - name: 6. 打包固件并生成 Release Tag
        if: env.UPLOAD_FIRMWARE == 'true' && env.UPLOAD_RELEASE == 'true'
        id: prepare_release
        run: |
          cd openwrt-src
          # 查找固件目录（通常为 bin/targets/*/*）
          TARGET_DIR=$(find bin/targets -type d -name "packages" -prune -o -type f -name "*-squashfs-combined*" -printf "%h\n" | head -1)
          if [ -z "$TARGET_DIR" ]; then
            echo "未找到固件文件，跳过上传"
            echo "TAG_NAME=" >> $GITHUB_ENV
            exit 0
          fi
          cd $TARGET_DIR
          # 打包所有镜像、manifest 等（排除 packages 目录）
          zip -r firmware.zip . -i "*.img" "*.vmdk" "*.vhdx" "*.vdi" "*.iso" "*.manifest"
          # 记录大小
          FILE_SIZE=$(stat -c%s firmware.zip)
          echo "FIRMWARE_ZIP_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          # 生成 release tag
          TAG_NAME="v$(date +'%Y%m%d-%H%M%S')"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          # 将打包文件移到工作区根目录，方便后续上传
          cp firmware.zip $GITHUB_WORKSPACE/firmware.zip

      - name: 7. 创建 GitHub Release 并上传固件
        if: env.UPLOAD_RELEASE == 'true' && env.TAG_NAME != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "OpenWrt J1900 精简版 ${{ env.TAG_NAME }}"
          body: |
            自动编译固件（J1900 毕业精简版）
            - 编译时间：${{ github.run_id }}
            - 固件大小：${{ env.FIRMWARE_ZIP_SIZE }} 字节
            - 移除 PassWall 及 Xray 组件
            - 已注入网页一键重置功能
          files: firmware.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----- 新增：编译完成 TG 通知（成功/失败） -----
      - name: 8. TG 通知 (编译结果)
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            EMOJI="✅"
            MSG="编译成功 🎉"
            # 如果上传了 Release，附带下载链接
            if [ "${{ env.UPLOAD_RELEASE }}" == "true" ] && [ "${{ env.TAG_NAME }}" != "" ]; then
              DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG_NAME }}"
              MSG="${MSG}%0A📦 下载地址: ${DOWNLOAD_URL}"
            fi
          else
            EMOJI="❌"
            MSG="编译失败，请检查日志"
          fi
          FULL_MSG="${EMOJI} OpenWrt 编译${MSG}%0A%0A📦 仓库: ${GITHUB_REPOSITORY}%0A🕒 时间: $(date '+%Y-%m-%d %H:%M:%S')%0A🔗 运行: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$FULL_MSG"
