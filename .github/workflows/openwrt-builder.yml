name: OpenWrt 云编译 (J1900 毕业精简版)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev jq

      - name: 3. 挂载编译缓存 (ccache & dl)
        uses: actions/cache@v4
        with:
          path: |
            cache/dl
            cache/ccache
          key: ${{ runner.os }}-openwrt-${{ hashFiles('feeds.conf.default', '.config', 'diy-part1.sh', 'diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-

      - name: 4. TG 通知 (编译开始)
        if: always()
        run: |
          MSG="🚀 OpenWrt 编译开始%0A%0A📦 仓库: ${GITHUB_REPOSITORY}%0A🕒 时间: $(date '+%Y-%m-%d %H:%M:%S')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG"

      - name: 5. 克隆源码与编译
        id: compile
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt-src
          cd openwrt-src

          mkdir -p ../cache/dl ../cache/ccache
          ln -sf ../cache/dl dl
          ln -sf ../cache/ccache .ccache

          export CCACHE_DIR="$PWD/.ccache"
          export PATH="/usr/lib/ccache:$PATH"
          ccache -M 10G

          [ -e ../$FEEDS_CONF ] && cp ../$FEEDS_CONF feeds.conf.default
          chmod +x ../$DIY_P1_SH && ../$DIY_P1_SH
          ./scripts/feeds update -a && ./scripts/feeds install -a
          [ -e ../$CONFIG_FILE ] && cp ../$CONFIG_FILE .config
          chmod +x ../$DIY_P2_SH && ../$DIY_P2_SH

          # 强制剔除 PassWall 与 Xray
          echo "正在精准移除 xray-core 及 PassWall 相关组件..."
          rm -rf package/feeds/packages/net/xray-core
          rm -rf package/feeds/packages/net/xray-plugin
          rm -rf package/feeds/luci/applications/luci-app-passwall
          sed -i 's/CONFIG_PACKAGE_luci-app-passwall=y/# CONFIG_PACKAGE_luci-app-passwall is not set/g' .config
          sed -i 's/CONFIG_PACKAGE_xray-core=y/# CONFIG_PACKAGE_xray-core is not set/g' .config

          # 注入网页端重置按键组件
          echo "正在注入网页端一键恢复出厂设置组件..."
          mkdir -p files/usr/libexec/rpcd
          mkdir -p files/usr/share/rpcd/acl.d
          mkdir -p files/usr/share/luci/menu.d
          mkdir -p files/www/luci-static/resources/view/system

          cat << 'EOF' > files/usr/libexec/rpcd/web_reset
          #!/bin/sh
          case "$1" in
              action)
                  (sleep 3; firstboot -y && reboot) &
                  echo '{"status":"success","message":"System is resetting and rebooting..."}'
                  ;;
              *)
                  echo '{"status":"error","message":"Invalid action"}'
                  exit 1
                  ;;
          esac
          EOF
          chmod +x files/usr/libexec/rpcd/web_reset

          cat << 'EOF' > files/usr/share/rpcd/acl.d/web_reset.json
          {
              "web_reset": {
                  "description": "Grant access to web reset script",
                  "read": {
                      "cgi-io": [ "exec" ]
                  },
                  "write": {
                      "cgi-io": [ "exec" ]
                  }
              }
          }
          EOF

          cat << 'EOF' > files/usr/share/luci/menu.d/luci-mod-admin-reset.json
          {
              "admin/system/web_reset": {
                  "title": "网页重置",
                  "action": {
                      "type": "view",
                      "path": "system/web_reset"
                  },
                  "order": 99,
                  "depends": {
                      "acl": [ "web_reset" ]
                  }
              }
          }
          EOF

          cat << 'EOF' > files/www/luci-static/resources/view/system/web_reset.js
          'use strict';
          /* sysauth: admin */

          return L.view.extend({
              handleReset: function(ev) {
                  if (!confirm(_('确定要将系统恢复出厂设置吗？此操作不可逆，将清除所有用户配置！')))
                      return;

                  L.ui.showModal(_('正在重置'), [
                      E('p', { 'class': 'spinning' }, _('系统正在清除数据并重启，请在 1-2 分钟后尝试重新连接路由器...'))
                  ]);

                  L.resolveDefault(L.rpc.declare({
                      object: 'file',
                      method: 'exec',
                      params: [ 'command', 'args' ]
                  })('/usr/libexec/rpcd/web_reset', ['action']), {}).then(function(res) {
                      setTimeout(function() {
                          window.location.reload();
                      }, 15000);
                  });
              },

              render: function() {
                  return E('div', { 'class': 'cbi-map' }, [
                      E('h2', {}, _('网页端一键重置')),
                      E('div', { 'class': 'cbi-map-descr' }, _('点击下方按钮将清除所有用户配置，恢复到固件刚编译完成后的初始状态。')),
                      E('section', { 'class': 'cbi-section' }, [
                          E('div', { 'class': 'cbi-section-node' }, [
                              E('div', { 'class': 'cbi-value' }, [
                                  E('label', { 'class': 'cbi-value-title' }, _('恢复出厂设置')),
                                  E('div', { 'class': 'cbi-value-field' }, [
                                      E('button', {
                                          'class': 'cbi-button cbi-button-reset',
                                          'click': L.bind(this.handleReset, this)
                                      }, _('执行重置'))
                                  ])
                              ])
                          ])
                      ])
                  ]);
              }
          });
          EOF

          # ==================== 开始编译 ====================
          make defconfig
          make -j$(nproc) || make -j1 V=s

      - name: 6. 整理固件文件
        id: organize
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          TARGET_DIR=$(find openwrt-src/bin/targets -mindepth 2 -maxdepth 2 -type d | head -n 1)
          if [ -z "$TARGET_DIR" ]; then
            echo "❌ 未找到固件输出目录，编译可能失败！"
            exit 1
          fi
          echo "📁 固件目录：$TARGET_DIR"
          cd "$TARGET_DIR"
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "RELEASE_TAG=J1900-OpenWrt-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 7. 发布至 Releases
        uses: softprops/action-gh-release@v2
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body: |
            ### 📦 J1900 毕业精简版 OpenWrt 固件
            * 🕒 编译时间：$(date '+%Y-%m-%d %H:%M:%S')
            * 🛠️ 特性：内置网页端一键恢复出厂设置按键，强制精简移除 PassWall & Xray 组件。
          files: |
            ${{ env.FIRMWARE }}/*.bin
            ${{ env.FIRMWARE }}/*.img.gz
            ${{ env.FIRMWARE }}/*.manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 8. TG 通知 (编译结束)
        if: always()   # 无论成功失败都执行
        run: |
          if [ "${{ steps.compile.outcome }}" == "success" ]; then
            STATUS="✅ 编译成功"
            RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ env.RELEASE_TAG }}"
            MSG="${STATUS}%0A%0A📦 仓库: ${GITHUB_REPOSITORY}%0A🕒 时间: $(date '+%Y-%m-%d %H:%M:%S')%0A🔗 下载: ${RELEASE_URL}"
          else
            STATUS="❌ 编译失败"
            MSG="${STATUS}%0A%0A📦 仓库: ${GITHUB_REPOSITORY}%0A🕒 时间: $(date '+%Y-%m-%d %H:%M:%S')%0A🔗 查看日志: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG"
