name: OpenWrt дә‘зј–иҜ‘ (J1900 жҜ•дёҡзІҫз®ҖзүҲ)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. жЈҖеҮәд»Јз Ғ
        uses: actions/checkout@v4

      - name: 2. еҲқе§ӢеҢ–зҺҜеўғ
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev jq

      - name: 3. жҢӮиҪҪзј–иҜ‘зј“еӯҳ (ccache & dl)
        uses: actions/cache@v4
        with:
          path: |
            cache/dl
            cache/ccache
          key: ${{ runner.os }}-openwrt-${{ hashFiles('feeds.conf.default', '.config', 'diy-part1.sh', 'diy-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-

      - name: 4. TG йҖҡзҹҘ (зј–иҜ‘ејҖе§Ӣ)
        if: always()
        run: |
          MSG="рҹҡҖ OpenWrt зј–иҜ‘ејҖе§Ӣ%0A%0Aрҹ“Ұ д»“еә“: ${GITHUB_REPOSITORY}%0Aрҹ•’ ж—¶й—ҙ: $(date '+%Y-%m-%d %H:%M:%S')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG"

      - name: 5. е…ӢйҡҶжәҗз ҒдёҺзј–иҜ‘
        id: compile
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt-src
          cd openwrt-src

          mkdir -p ../cache/dl ../cache/ccache
          ln -sf ../cache/dl dl
          ln -sf ../cache/ccache .ccache

          export CCACHE_DIR="$PWD/.ccache"
          export PATH="/usr/lib/ccache:$PATH"
          ccache -M 10G

          [ -e ../$FEEDS_CONF ] && cp ../$FEEDS_CONF feeds.conf.default
          chmod +x ../$DIY_P1_SH && ../$DIY_P1_SH
          
          ./scripts/feeds update -a && ./scripts/feeds install -a
          
          [ -e ../$CONFIG_FILE ] && cp ../$CONFIG_FILE .config
          chmod +x ../$DIY_P2_SH && ../$DIY_P2_SH

          # ејәеҲ¶ејҖеҗҜ ccache й…ҚзҪ®
          sed -i 's/CONFIG_CCACHE=n/CONFIG_CCACHE=y/g' .config || echo 'CONFIG_CCACHE=y' >> .config

          make defconfig
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: 6. дёҠдј еӣәд»¶еҲ° Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: Build_${{ env.FILE_DATE }}
          files: openwrt-src/bin/targets/*/*/*.{img.gz,img,bin}

      - name: 7. TG йҖҡзҹҘ (зј–иҜ‘з»“жһң)
        if: always()
        run: |
          STATUS=$([[ "${{ steps.compile.outputs.status }}" == "success" ]] && echo "вң… зј–иҜ‘жҲҗеҠҹ" || echo "вқҢ зј–иҜ‘еӨұиҙҘ")
          MSG="${STATUS}%0A%0Aрҹ“Ұ д»“еә“: ${GITHUB_REPOSITORY}%0Aрҹ•’ ж—¶й—ҙ: $(date '+%Y-%m-%d %H:%M:%S')%0Aрҹ”— иҜҰжғ…: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG"
